name: Deploy Adaptify to Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/adaptify.jar
          retention-days: 1

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./

      - name: Copy JAR to VM (Temp directory)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          source: "adaptify.jar"
          target: "/tmp"

      - name: Deploy, Restart & Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            DEPLOY_DIR="/opt/adaptify"
            JAR="adaptify.jar"
            SERVICE="adaptify"

            # Ensure deployment directory exists
            sudo mkdir -p $DEPLOY_DIR
            sudo chown $USER:$USER $DEPLOY_DIR

            echo "==> Stopping service..."
            sudo systemctl stop $SERVICE || true

            echo "==> Rotating JAR..."
            if [ -f "$DEPLOY_DIR/$JAR" ]; then
              cp "$DEPLOY_DIR/$JAR" "$DEPLOY_DIR/$JAR.prev"
            fi
            
            # Move the new JAR from tmp to the deployment folder
            mv "/tmp/$JAR" "$DEPLOY_DIR/$JAR"
            chmod 755 "$DEPLOY_DIR/$JAR"

            echo "==> Starting service..."
            sudo systemctl start $SERVICE
            sudo systemctl enable $SERVICE

            echo "==> Waiting for health check..."
            sleep 8
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/ || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "==> Health check passed (HTTP 200)"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "==> Health check failed — rolling back!"
                cp "$DEPLOY_DIR/$JAR.prev" "$DEPLOY_DIR/$JAR"
                sudo systemctl restart $SERVICE
                exit 1
              fi
              echo "    Attempt $i: HTTP $STATUS — retrying in 5s..."
              sleep 5
            done

            echo "==> Deployment successful!"
            sudo systemctl status $SERVICE --no-pager

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed Adaptify to Cloud" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** ${{ secrets.VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY