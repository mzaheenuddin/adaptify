name: Build & Deploy to Cloud VM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAR_NAME: adaptify.jar
  DEPLOY_DIR: /opt/adaptify
  SERVICE_NAME: adaptify

jobs:
  # ── 1. BUILD ─────────────────────────────────────────────────────────────
  build:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for speed)
        run: mvn clean package -DskipTests -B

      - name: Verify JAR exists
        run: ls -lh target/${{ env.JAR_NAME }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/${{ env.JAR_NAME }}
          retention-days: 7

  # ── 2. DEPLOY ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy JAR to VM
        run: |
          scp -i ~/.ssh/deploy_key \
              ./artifact/${{ env.JAR_NAME }} \
              ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ env.DEPLOY_DIR }}/${{ env.JAR_NAME }}.new

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            JAR="${{ env.JAR_NAME }}"
            SERVICE="${{ env.SERVICE_NAME }}"

            echo "==> Stopping service..."
            sudo systemctl stop $SERVICE || true

            echo "==> Rotating JAR..."
            if [ -f "$DEPLOY_DIR/$JAR" ]; then
              cp "$DEPLOY_DIR/$JAR" "$DEPLOY_DIR/$JAR.prev"
            fi
            mv "$DEPLOY_DIR/$JAR.new" "$DEPLOY_DIR/$JAR"

            echo "==> Starting service..."
            sudo systemctl start $SERVICE
            sudo systemctl enable $SERVICE

            echo "==> Waiting for health check..."
            sleep 8
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "==> Health check passed (HTTP 200)"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "==> Health check failed — rolling back!"
                cp "$DEPLOY_DIR/$JAR.prev" "$DEPLOY_DIR/$JAR"
                sudo systemctl restart $SERVICE
                exit 1
              fi
              echo "    Attempt $i: HTTP $STATUS — retrying in 5s..."
              sleep 5
            done

            echo "==> Deployment successful!"
            sudo systemctl status $SERVICE --no-pager
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
